services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: build_break_fix
      POSTGRES_USER: bbf
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbf -d build_break_fix"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
