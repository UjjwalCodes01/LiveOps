# Provides a clean local Postgres only — schema comes from `npm run migrate`
# (scripts/migrate.cjs), not container init. Mounting migrations/ into
# docker-entrypoint-initdb.d used to apply them a second, untracked way on
# first container start, so `npm run migrate` would then fail trying to
# CREATE TABLE things that already existed.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: build_break_fix
      POSTGRES_USER: bbf
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbf -d build_break_fix"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
