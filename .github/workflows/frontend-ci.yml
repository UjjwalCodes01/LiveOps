name: frontend-ci

# Gates: build (includes Next's type check), lint, and Vitest unit tests
# over the pure logic (curriculum, humanize, topology health). Component/DOM
# tests (jsdom + Testing Library) can be layered on top of this later.
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

defaults:
  run:
    working-directory: frontend

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
